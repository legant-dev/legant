# EXAMPLE secret — do NOT commit real values. In production, source these from a
# secret manager (External Secrets Operator, Vault, SOPS, cloud secret stores)
# rather than a plaintext manifest.
#
# Generate strong values, e.g.:
#   openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: legant-secrets
  labels:
    app.kubernetes.io/name: legant
type: Opaque
stringData:
  LEGANT_DATABASE_URL: "postgres://legant:CHANGE_ME@postgres:5432/legant?sslmode=require"
  # Fosite global HMAC secret (32+ bytes).
  LEGANT_SECRETS_SYSTEM: "CHANGE_ME_to_a_32_byte_random_string_1"
  # Cookie signing secret (32+ bytes), distinct from SYSTEM.
  LEGANT_SECRETS_COOKIE: "CHANGE_ME_to_a_32_byte_random_string_2"
  # Master key that envelope-encrypts signing keys at rest (32+ bytes), distinct
  # from the above. Rotate with `legant keys reencrypt --new-secret ...`.
  LEGANT_SECRETS_KEY_ENCRYPTION: "CHANGE_ME_to_a_32_byte_random_string_3"

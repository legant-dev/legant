{{- if and (not .Values.secrets.existingSecret) .Values.secrets.create }}
# Rendered from values — for TRIAL/DEV only. In production set
# secrets.existingSecret to a Secret you manage (External Secrets Operator, Vault,
# SOPS, a cloud secret store) and leave secrets.create=false.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "legant.secretName" . }}
  labels:
    {{- include "legant.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}

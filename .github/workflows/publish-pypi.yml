name: Publish SDK to PyPI

# Publishes the Python SDK (clients/python -> legant-sdk) via PyPI Trusted
# Publishing (OIDC), no API token. Run it manually from the Actions tab when the
# Python SDK version changes. It is intentionally NOT tied to GitHub releases: the
# SDKs version independently from the CLI, so a CLI release tag should not trigger a
# duplicate PyPI publish. Requires a configured Trusted Publisher on the PyPI
# project (owner legant-dev, repo legant, workflow publish-pypi.yml, environment pypi).
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the SDK
        working-directory: clients/python
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist

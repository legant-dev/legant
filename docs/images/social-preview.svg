<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#0d1018"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4ce80"/>
      <stop offset="1" stop-color="#e2b457"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- subtle top hairline + corner glow -->
  <rect width="1280" height="3" fill="url(#gold)" opacity="0.85"/>
  <circle cx="1180" cy="-40" r="280" fill="#e2b457" opacity="0.05"/>

  <!-- left rail -->
  <g transform="translate(84,150)">
    <!-- wordmark -->
    <text x="0" y="0" font-size="86" font-weight="700" letter-spacing="-2" fill="#e8ebf2">L<tspan fill="url(#gold)">e</tspan>gant</text>

    <!-- tagline -->
    <text x="3" y="74" font-size="31" font-weight="600" fill="#e8ebf2">Delegated authorization for AI agents</text>
    <text x="3" y="118" font-size="22" fill="#9aa3b2" font-family="'SF Mono','Menlo',monospace">OAuth 2.1&#160;&#160;·&#160;&#160;RFC 8693 on-behalf-of tokens</text>

    <!-- one-liner -->
    <text x="3" y="186" font-size="20" fill="#c3cad6">An agent acts <tspan font-style="italic" fill="#e8ebf2">on your behalf</tspan> with authority you can scope,</text>
    <text x="3" y="216" font-size="20" fill="#c3cad6">time-box, attenuate, and revoke — verified offline.</text>

    <!-- footer line -->
    <text x="3" y="332" font-size="18" fill="#69728a" font-family="'SF Mono','Menlo',monospace">single Go binary&#160;&#160;·&#160;&#160;Apache-2.0&#160;&#160;·&#160;&#160;github.com/legant-dev/legant</text>
  </g>

  <!-- right: token card motif -->
  <g transform="translate(792,150)">
    <rect x="0" y="0" width="404" height="340" rx="14" fill="#11141c" stroke="#222838" stroke-width="1.5"/>
    <rect x="0" y="0" width="404" height="44" rx="14" fill="#151926"/>
    <rect x="0" y="30" width="404" height="14" fill="#151926"/>
    <circle cx="24" cy="22" r="5" fill="#f47171"/>
    <circle cx="44" cy="22" r="5" fill="#e2b457"/>
    <circle cx="64" cy="22" r="5" fill="#34d399"/>
    <text x="384" y="27" text-anchor="end" font-size="13" fill="#69728a" font-family="'SF Mono','Menlo',monospace">delegation token</text>

    <g font-family="'SF Mono','Menlo',monospace" font-size="16.5">
      <text x="26" y="86"  fill="#69728a">sub</text><text x="120" y="86"  fill="#e8ebf2">alice@acme</text>
      <text x="26" y="116" fill="#69728a">act</text><text x="120" y="116" fill="#e8ebf2">agent → sub-agent</text>
      <text x="26" y="146" fill="#69728a">aud</text><text x="120" y="146" fill="#e8ebf2">warehouse-api</text>
      <text x="26" y="176" fill="#69728a">tools</text><text x="120" y="176" fill="#86e9c4">[query, read]</text>
      <text x="26" y="206" fill="#69728a">max</text><text x="120" y="206" fill="#86e9c4">$500 · 9–18:00</text>
      <text x="26" y="236" fill="#69728a">ttl</text><text x="120" y="236" fill="#86e9c4">15m</text>
    </g>

    <line x1="22" y1="262" x2="382" y2="262" stroke="#222838" stroke-width="1.2"/>
    <g transform="translate(26,290)">
      <rect x="0" y="-19" width="150" height="30" rx="6" fill="#0e2b22"/>
      <text x="14" y="2" font-size="15" fill="#34d399" font-family="'SF Mono','Menlo',monospace">✓ allow query</text>
      <rect x="166" y="-19" width="188" height="30" rx="6" fill="#2c1416"/>
      <text x="180" y="2" font-size="15" fill="#f47171" font-family="'SF Mono','Menlo',monospace">✕ deny bulk-export</text>
    </g>
  </g>
</svg>

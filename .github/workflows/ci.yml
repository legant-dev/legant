name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: legant
          POSTGRES_PASSWORD: legant
          POSTGRES_DB: legant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legant -d legant_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Integration tests run against this database; the round-trip test gets its
      # own so rolling fully down never clobbers the integration schema.
      LEGANT_TEST_DATABASE_URL: postgres://legant:legant@localhost:5432/legant_test?sslmode=disable
      LEGANT_MIGRATE_ROUNDTRIP_URL: postgres://legant:legant@localhost:5432/legant_roundtrip?sslmode=disable
      # Turn an unset test DB into a hard failure so DB coverage can't silently vanish.
      LEGANT_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Provision round-trip database
        run: PGPASSWORD=legant psql -h localhost -U legant -d legant_test -c 'CREATE DATABASE legant_roundtrip;'

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l internal cmd examples)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # Includes TestMigrationsWellFormed (fails on duplicate migration versions)
      # and TestMigrationRoundTrip (up -> down -> up on a throwaway database).
      - name: test (race + coverage)
        run: go test -race -cover ./...

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
